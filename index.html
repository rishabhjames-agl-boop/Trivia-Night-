<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trivia Night — Host Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0A0B;
  --bg2:#101013;
  --fg:#F5F2EC;
  --muted:#8A8780;
  --accent:#4D6BFF;       /* electric indigo */
  --accent-soft:rgba(77,107,255,0.14);
  --gold:#D7B26B;         /* used very sparingly: live/winner */
  --good:#54C28A;
  --bad:#E5604B;
  --line:rgba(255,255,255,0.08);
  --surf:rgba(255,255,255,0.035);
  --surf2:rgba(255,255,255,0.06);
  --radius:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--fg);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
body{min-height:100vh;padding-bottom:80px}
::selection{background:var(--accent);color:#fff}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select{font-family:inherit}
.mono{font-family:'JetBrains Mono',monospace}
.display{font-family:'Space Grotesk',sans-serif;letter-spacing:-0.02em}

/* ---------- Scoreboard (sticky top) ---------- */
.scoreboard{
  position:sticky;top:0;z-index:50;
  background:rgba(10,10,11,0.82);backdrop-filter:blur(18px);
  border-bottom:1px solid var(--line);
  padding:14px clamp(16px,4vw,40px);
}
.sb-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:space-between}
.sb-brand{display:flex;align-items:baseline;gap:12px}
.sb-brand h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(1.05rem,2.4vw,1.4rem);letter-spacing:-0.03em}
.sb-brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 14px var(--accent);animation:pulse 2.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.sb-teams{display:flex;gap:10px;flex-wrap:wrap}
.sb-team{
  display:flex;flex-direction:column;gap:2px;
  background:var(--surf);border:1px solid var(--line);border-radius:12px;
  padding:8px 16px;min-width:104px;position:relative;overflow:hidden;
  transition:transform .35s cubic-bezier(.16,1,.3,1),border-color .35s;
}
.sb-team.lead{border-color:var(--gold)}
.sb-team.lead::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(215,178,107,.10),transparent);pointer-events:none}
.sb-team .nm{font-size:.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.sb-team .sc{font-family:'Space Grotesk';font-weight:700;font-size:1.5rem;line-height:1;transition:color .3s}
.sb-team .flash{animation:flash .8s ease}
@keyframes flash{0%{color:var(--gold);transform:scale(1.18)}100%{color:var(--fg);transform:scale(1)}}

/* ---------- Layout ---------- */
.wrap{max-width:1080px;margin:0 auto;padding:clamp(20px,4vw,44px)}
.kicker{font-size:.74rem;text-transform:uppercase;letter-spacing:.14em;color:var(--accent);font-weight:600;margin-bottom:14px}
.kicker.dim{color:var(--muted)}
h2.title{font-family:'Space Grotesk';font-weight:700;font-size:clamp(2rem,6vw,3.4rem);line-height:.98;letter-spacing:-0.03em;margin-bottom:10px}
.lead{color:var(--muted);font-size:1.02rem;line-height:1.6;max-width:60ch}

/* ---------- Run order nav ---------- */
.runorder{display:flex;gap:8px;overflow-x:auto;padding:18px clamp(16px,4vw,40px);border-bottom:1px solid var(--line);scrollbar-width:thin}
.runorder::-webkit-scrollbar{height:6px}
.runorder::-webkit-scrollbar-thumb{background:var(--surf2);border-radius:6px}
.ro-btn{
  white-space:nowrap;padding:9px 16px;border-radius:999px;border:1px solid var(--line);
  background:var(--surf);color:var(--muted);font-weight:600;font-size:.82rem;
  display:flex;align-items:center;gap:8px;transition:all .3s cubic-bezier(.16,1,.3,1);flex:none;
}
.ro-btn .num{font-family:'JetBrains Mono';font-size:.72rem;opacity:.7}
.ro-btn:hover{color:var(--fg);border-color:rgba(255,255,255,.2)}
.ro-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ro-btn.done{color:var(--good)}
.ro-btn.done .num::before{content:'✓ '}

/* ---------- Cards ---------- */
.card{background:var(--surf);border:1px solid var(--line);border-radius:var(--radius);padding:clamp(18px,3vw,28px)}
.card+.card{margin-top:16px}
.panel{background:var(--bg2);border:1px solid var(--line);border-radius:var(--radius);padding:clamp(18px,3vw,28px)}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:12px 22px;border-radius:11px;font-weight:600;font-size:.92rem;
  background:var(--accent);color:#fff;border:1px solid var(--accent);
  transition:transform .25s cubic-bezier(.16,1,.3,1),filter .25s,background .25s;
}
.btn:hover{transform:translateY(-1px);filter:brightness(1.1)}
.btn:active{transform:translateY(0)}
.btn.ghost{background:transparent;color:var(--fg);border-color:var(--line)}
.btn.ghost:hover{border-color:rgba(255,255,255,.25);background:var(--surf)}
.btn.good{background:var(--good);border-color:var(--good)}
.btn.bad{background:var(--bad);border-color:var(--bad)}
.btn.gold{background:var(--gold);border-color:var(--gold);color:#1a1408}
.btn.sm{padding:8px 14px;font-size:.82rem;border-radius:9px}
.btn.block{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* ---------- Question display ---------- */
.qstage{text-align:center;padding:clamp(20px,5vw,48px) clamp(16px,4vw,40px)}
.q-meta{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:22px;flex-wrap:wrap}
.tag{font-size:.72rem;text-transform:uppercase;letter-spacing:.1em;font-weight:600;padding:5px 12px;border-radius:999px;border:1px solid var(--line);color:var(--muted)}
.tag.tier1{color:#7FD1FF;border-color:rgba(127,209,255,.3)}
.tag.tier2{color:var(--gold);border-color:rgba(215,178,107,.3)}
.tag.tier3{color:var(--bad);border-color:rgba(229,96,75,.35)}
.tag.team{color:var(--accent);border-color:rgba(77,107,255,.4);background:var(--accent-soft)}
.q-text{font-family:'Space Grotesk';font-weight:600;font-size:clamp(1.4rem,4.4vw,2.5rem);line-height:1.18;letter-spacing:-0.02em;max-width:24ch;margin:0 auto 6px}
.q-answer{margin-top:24px;font-size:1.3rem;color:var(--good);font-weight:600;min-height:1.6em;font-family:'Space Grotesk'}
.q-answer .lbl{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin-bottom:6px;font-family:'Inter';font-weight:600}
.q-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:30px}
.q-progress{display:flex;gap:6px;justify-content:center;margin-top:30px}
.q-progress .pip{width:8px;height:8px;border-radius:50%;background:var(--surf2);transition:background .3s}
.q-progress .pip.done{background:var(--accent)}
.q-progress .pip.current{background:var(--gold);box-shadow:0 0 10px var(--gold)}

/* ---------- Timer ---------- */
.timer{font-family:'JetBrains Mono';font-weight:700;font-size:2.6rem;letter-spacing:.02em;transition:color .3s}
.timer.warn{color:var(--gold)}
.timer.danger{color:var(--bad)}
.timer-ring{position:relative;width:120px;height:120px;margin:0 auto}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .lbl{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}

/* ---------- Auction ---------- */
.bidgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:20px 0}
.bidcard{background:var(--bg2);border:1px solid var(--line);border-radius:13px;padding:16px;text-align:center}
.bidcard .bn{font-weight:600;font-size:.92rem;margin-bottom:12px}
.bidstepper{display:flex;align-items:center;justify-content:center;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.bidstepper button{width:42px;height:42px;font-size:1.3rem;font-weight:700;background:var(--surf);transition:background .2s}
.bidstepper button:hover{background:var(--surf2)}
.bidstepper .val{flex:1;font-family:'JetBrains Mono';font-weight:700;font-size:1.4rem;min-width:48px}
.bidcard.out{opacity:.4}
.bidcard.winner{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
.bidcard .badge{margin-top:10px;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;font-weight:700}
.bidcard.winner .badge{color:var(--gold)}
.bidcard.dead .badge{color:var(--muted)}

/* ---------- Category board ---------- */
.catgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:18px}
.cat{
  background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:22px 18px;text-align:center;
  transition:all .3s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden;
}
.cat:hover:not(.taken){border-color:var(--accent);transform:translateY(-2px)}
.cat .cn{font-family:'Space Grotesk';font-weight:600;font-size:1.15rem}
.cat .cd{font-size:.76rem;color:var(--muted);margin-top:4px}
.cat.taken{opacity:.55}
.cat.taken .owner{margin-top:10px;font-size:.74rem;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.06em}

/* ---------- Pick order ---------- */
.pickorder{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.po-item{display:flex;align-items:center;gap:14px;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:12px 18px;transition:all .4s cubic-bezier(.16,1,.3,1)}
.po-item .pos{font-family:'JetBrains Mono';font-weight:700;font-size:1.1rem;color:var(--gold);width:28px}
.po-item .pnm{font-weight:600}

/* ---------- Write-down marking ---------- */
.clip{background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:16px 18px;margin-bottom:10px;transition:border-color .3s}
.clip.revealed{border-color:rgba(84,194,138,.3)}
.clip-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.clip-num{font-family:'JetBrains Mono';font-weight:700;color:var(--muted);font-size:.85rem;width:28px}
.clip-type{font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;padding:3px 9px;border-radius:999px}
.clip-type.song{background:rgba(77,107,255,.16);color:#9DB0FF}
.clip-type.sound{background:rgba(215,178,107,.16);color:var(--gold)}
.clip-type.image{background:rgba(84,194,138,.16);color:var(--good)}
.clip-title{font-weight:600;flex:1;min-width:120px}
.clip-ans{font-family:'Space Grotesk';font-weight:600;color:var(--good)}
.clip-mark{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.mark-btn{padding:7px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surf);font-size:.8rem;font-weight:600;color:var(--muted);transition:all .25s}
.mark-btn:hover{border-color:var(--accent);color:var(--fg)}
.mark-btn.on{background:var(--good);border-color:var(--good);color:#06170e}

/* ---------- Picture reveal ---------- */
.revealstage{text-align:center}
.revealbox{
  width:min(420px,90vw);aspect-ratio:1;margin:0 auto;border-radius:18px;overflow:hidden;
  background:var(--bg2);border:1px solid var(--line);position:relative;display:flex;align-items:center;justify-content:center;
}
.revealbox img{width:100%;height:100%;object-fit:cover;transition:filter .6s ease,transform .6s ease}
.revealbox .placeholder{color:var(--muted);padding:30px;font-size:.9rem}
.revealbox .upload-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;color:var(--muted);font-size:.85rem;border:2px dashed var(--line);border-radius:18px;margin:10px;transition:border-color .3s,color .3s}
.revealbox .upload-label:hover{border-color:var(--accent);color:var(--fg)}
.reveal-controls{display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.reveal-dots{display:flex;gap:6px;justify-content:center;margin-top:14px}
.reveal-dots .d{width:26px;height:5px;border-radius:3px;background:var(--surf2);transition:background .3s}
.reveal-dots .d.on{background:var(--accent)}

/* ---------- Marble race ---------- */
.track{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:18px;margin:16px 0;overflow:hidden}
.lane{display:flex;align-items:center;gap:12px;height:46px;position:relative}
.lane .marble{width:26px;height:26px;border-radius:50%;position:absolute;left:0;transition:left .1s linear;box-shadow:0 0 12px rgba(0,0,0,.4),inset -3px -3px 6px rgba(0,0,0,.3),inset 3px 3px 6px rgba(255,255,255,.25);z-index:2}
.lane .lane-label{width:80px;font-weight:600;font-size:.82rem;flex:none}
.lane .lane-track{flex:1;height:3px;background:var(--surf2);border-radius:3px;position:relative}
.lane .odds{font-family:'JetBrains Mono';font-size:.78rem;color:var(--gold);width:48px;text-align:right;flex:none}
.finish{position:absolute;right:0;top:0;bottom:0;width:4px;background:repeating-linear-gradient(45deg,var(--fg),var(--fg) 4px,transparent 4px,transparent 8px);opacity:.4}

/* ---------- Coin ---------- */
.coin{width:140px;height:140px;margin:24px auto;border-radius:50%;background:radial-gradient(circle at 35% 30%,#F0D89A,var(--gold) 60%,#9A7A3A);display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;font-size:2rem;color:#3a2c0e;box-shadow:0 14px 40px rgba(0,0,0,.5);transition:transform .1s}
.coin.flipping{animation:flip 1.1s cubic-bezier(.3,.0,.3,1)}
@keyframes flip{0%{transform:rotateX(0)}100%{transform:rotateX(2520deg)}}

/* ---------- Sumo ---------- */
.sumogrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-top:18px}
.sumocard{background:var(--surf);border:1px solid var(--line);border-radius:16px;padding:20px;text-align:center;transition:all .3s cubic-bezier(.16,1,.3,1);position:relative;overflow:hidden}
.sumocard::before{content:'';position:absolute;inset:0 0 auto 0;height:4px;background:var(--sc,var(--accent))}
.sumocard:hover{transform:translateY(-3px);border-color:var(--sc,var(--accent))}
.sumocard .emoji{font-size:2.6rem;line-height:1}
.sumocard .snm{font-family:'Space Grotesk';font-weight:700;font-size:1.2rem;margin-top:8px}
.sumocard .stitle{font-size:.78rem;color:var(--sc,var(--accent));font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.sumocard .sstats{display:flex;justify-content:center;gap:14px;margin-top:12px;flex-wrap:wrap}
.sumocard .stat{font-size:.72rem;color:var(--muted)}
.sumocard .stat b{display:block;color:var(--fg);font-family:'JetBrains Mono';font-size:.92rem;margin-top:1px}
.sumocard .staunt{font-style:italic;font-size:.8rem;color:var(--muted);margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.sumocard .pickedby{margin-top:10px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--sc,var(--accent))}
.sumocard.chosen{box-shadow:0 0 0 1px var(--sc,var(--accent))}

.bracket{display:flex;flex-direction:column;gap:14px;margin-top:18px}
.bout{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:18px}
.bout .bout-label{font-size:.72rem;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:600;margin-bottom:14px;text-align:center}
.bout.final .bout-label{color:var(--gold)}
.bout-row{display:flex;align-items:stretch;gap:12px}
.fighter{flex:1;background:var(--surf);border:1px solid var(--line);border-radius:13px;padding:16px;text-align:center;transition:all .4s cubic-bezier(.16,1,.3,1);min-width:0}
.fighter .f-emoji{font-size:2.2rem}
.fighter .f-team{font-weight:700;font-size:.95rem;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fighter .f-sumo{font-size:.78rem;color:var(--muted);margin-top:2px}
.fighter.win{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold);transform:scale(1.03)}
.fighter.win .f-team{color:var(--gold)}
.fighter.lose{opacity:.4}
.fighter.tbd{display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.85rem}
.vs{display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:var(--muted);font-size:1.1rem;flex:none;width:46px;position:relative}
.vs.clash{animation:shake .5s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px) scale(1.3)}75%{transform:translateX(4px) scale(1.3)}}
.bout .fight-btn{margin-top:14px;width:100%}
.champion-banner{text-align:center;padding:24px;background:linear-gradient(180deg,rgba(215,178,107,.12),transparent);border:1px solid var(--gold);border-radius:16px;margin-top:6px}
.champion-banner .ce{font-size:3rem}
.champion-banner .ct{font-family:'Space Grotesk';font-weight:700;font-size:1.8rem;margin-top:6px}

/* ---------- misc ---------- */
.row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.row.between{justify-content:space-between}
.divider{height:1px;background:var(--line);margin:22px 0}
.hint{font-size:.82rem;color:var(--muted);line-height:1.55}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:600;padding:5px 11px;border-radius:999px;background:var(--accent-soft);color:#9DB0FF}
.hidden{display:none!important}
.fade-in{animation:fadeUp .6s cubic-bezier(.16,1,.3,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.editname{background:transparent;border:none;border-bottom:1px dashed transparent;color:inherit;font:inherit;text-align:center;width:100%}
.editname:hover,.editname:focus{border-bottom-color:var(--line);outline:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:14px 22px;font-weight:600;z-index:200;opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1);box-shadow:0 12px 40px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.win{border-color:var(--gold)}
.bank-q{background:var(--surf);border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin-bottom:9px;display:flex;justify-content:space-between;gap:14px;align-items:center}
.bank-q .bq-a{color:var(--good);font-weight:600;font-size:.86rem;white-space:nowrap}
label.fld{display:block;margin-bottom:14px}
label.fld .l{font-size:.78rem;color:var(--muted);font-weight:600;margin-bottom:6px;display:block}
input.txt,select.txt{width:100%;padding:11px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;color:var(--fg);font-size:.95rem}
input.txt:focus,select.txt:focus{outline:none;border-color:var(--accent)}
.foot{text-align:center;color:var(--muted);font-size:.78rem;padding:40px 20px 10px}
@media(max-width:640px){
  .sb-team{min-width:78px;padding:7px 11px}
  .sb-team .sc{font-size:1.2rem}
  .sb-team .nm{max-width:90px}
}
</style>
</head>
<body>

<!-- ===================== SCOREBOARD ===================== -->
<div class="scoreboard">
  <div class="sb-row">
    <div class="sb-brand">
      <span class="dot"></span>
      <h1 class="display">TRIVIA NIGHT</h1>
    </div>
    <div class="sb-teams" id="sbTeams"></div>
  </div>
</div>

<!-- ===================== RUN ORDER ===================== -->
<div class="runorder" id="runorder"></div>

<!-- ===================== STAGE ===================== -->
<div class="wrap" id="stage"></div>

<div class="foot">Host console · tap a team's score to fine-tune · everything saves to this device</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   DATA
   ============================================================ */
const TEAMS_DEFAULT = [
  {name:"Team 1", members:"Nikhil · Harika · Smrithi · Yashna · Zoltan"},
  {name:"Team 2", members:"Akshaya · Tanisha · Shruthi · Sahithi · Malaika"},
  {name:"Team 3", members:"George · Jarred · Shreya · Mahathi · Gaurav"},
];

/* Round 1 — GK, three tiers, one Q per team per tier */
const GK = {
  tiers:[
    {tier:1, label:"Not-really-easy", qs:[
      {q:"What's the only US state name that starts with two vowels?", a:"Iowa"},
      {q:"How many seconds are there in an hour?", a:"3,600"},
      {q:"What colour do you get when you mix all the primary colours of light?", a:"White (it's pigment that makes brown)"},
      {q:"Which country has a maple leaf on its flag — though the tree isn't native to most of it?", a:"Canada"},
    ]},
    {tier:2, label:"Medium", qs:[

    toast(`${t.name} ${delta>=0?'+':''}${delta} → ${t.score}`, delta>=0?'':'');

function toast(msg, cls=''){

function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* ============================================================
   AUCTION (shared by all read-aloud rounds)
   Rules: each OTHER team secretly bids 1–10. Highest UNIQUE bid wins.
   Right = +bid, Wrong = -bid. Top tie cancels, next unique wins.
   All tied / no unique = dead, nobody scores.
   ============================================================ */
function resolveAuction(bids){ // bids: [{teamId,bid}]
  const counts={}; bids.forEach(b=>counts[b.bid]=(counts[b.bid]||0)+1);
  const uniq = bids.filter(b=>counts[b.bid]===1).sort((a,b)=>b.bid-a.bid);
  return uniq.length? uniq[0] : null;
}

function openAuction(failTeamId, onClose){
  const eligible = state.teams.filter(t=>t.id!==failTeamId);
  const bids = {}; eligible.forEach(t=>bids[t.id]=1);
  let resolved = null;

  const overlay = el(`<div class="card fade-in" id="auctionPane" style="margin-top:18px;border-color:var(--accent)">
    <div class="kicker">Steal Auction · question passed</div>
    <p class="hint" style="margin-bottom:4px">Each remaining team secretly bid <b>1–10</b>, then reveal together. Enter the bids:</p>
    <div class="bidgrid" id="bidGrid"></div>
    <div class="row between">
      <button class="btn ghost sm" id="auCancel">Cancel</button>
      <button class="btn" id="auResolve">Reveal &amp; resolve</button>
    </div>
    <div id="auResult"></div>
  </div>`);

  function drawBids(){
    overlay.querySelector('#bidGrid').innerHTML = eligible.map(t=>`
      <div class="bidcard" data-bc="${t.id}">
        <div class="bn">${escapeHtml(t.name)}</div>
        <div class="bidstepper">
          <button data-step="-1" data-t="${t.id}">–</button>
          <span class="val" id="bid-${t.id}">${bids[t.id]}</span>
          <button data-step="1" data-t="${t.id}">+</button>
        </div>
      </div>`).join("");
    overlay.querySelectorAll('[data-step]').forEach(b=>b.onclick=()=>{
      const id=+b.dataset.t, s=+b.dataset.step;
      bids[id]=Math.max(1,Math.min(10,bids[id]+s));
      overlay.querySelector('#bid-'+id).textContent=bids[id];
    });
  }
  drawBids();

  overlay.querySelector('#auCancel').onclick=()=>{ overlay.remove(); onClose&&onClose(); };
  overlay.querySelector('#auResolve').onclick=()=>{
    if(resolved){ overlay.remove(); onClose&&onClose(); return; }
    const arr = eligible.map(t=>({teamId:t.id,bid:bids[t.id]}));
    const win = resolveAuction(arr);
    resolved = win || {dead:true};
    // visuals
    eligible.forEach(t=>{
      const bc=overlay.querySelector(`[data-bc="${t.id}"]`);
      bc.classList.add('out');
      if(win && t.id===win.teamId){ bc.classList.remove('out'); bc.classList.add('winner');
        bc.insertAdjacentHTML('beforeend',`<div class="badge">WON · bid ${win.bid}</div>`); }
    });
    const res = overlay.querySelector('#auResult');
    if(!win){
      res.innerHTML=`<div class="divider"></div><p class="q-text" style="font-size:1.3rem;color:var(--muted)">Tie at the top — bids cancel. Question is dead, nobody scores.</p>
        <div class="q-actions"><button class="btn ghost" id="auDone">Move on</button></div>`;
    } else {
      const wt = state.teams.find(t=>t.id===win.teamId);
      res.innerHTML=`<div class="divider"></div>
        <p class="q-text" style="font-size:1.3rem"><b style="color:var(--gold)">${escapeHtml(wt.name)}</b> wins the steal at <b>${win.bid}</b>. Were they right?</p>
        <div class="q-actions">
          <button class="btn good" id="auWin">Correct · +${win.bid}</button>
          <button class="btn bad" id="auLose">Wrong · −${win.bid}</button>
        </div>`;
      res.querySelector('#auWin').onclick=()=>{ adjustScore(win.teamId, win.bid); finishAu(); };
      res.querySelector('#auLose').onclick=()=>{ adjustScore(win.teamId, -win.bid); finishAu(); };
    }
    const dn=res.querySelector('#auDone'); if(dn) dn.onclick=finishAu;
    overlay.querySelector('#auResolve').classList.add('hidden');
    function finishAu(){ overlay.remove(); onClose&&onClose(); }
  };
  return overlay;
}

/* ============================================================
   READ-ALOUD ROUND ENGINE (GK & Movies share this)

function flattenTiers(data){
  const n = state.teams.length;
  const list=[]; let g=0;
  data.tiers.forEach(t=> t.qs.forEach((q)=> { list.push({...q, tier:t.tier, tierLabel:t.label, teamId: g % n}); g++; }));
  return list;
}

function renderReadAloud(key, data, idxKey, titleObj){
  const list = flattenTiers(data);
  let i = state[idxKey];
  if(i>=list.length){
    return renderRoundComplete(key, titleObj.title, ()=>{ state[idxKey]=0; save(); render(); });
  }
  const item = list[i];
  const team = state.teams[item.teamId] || state.teams[0];
  const stage = $("#stage");
  stage.innerHTML='';
  stage.appendChild(el(`
    <div class="fade-in">
      <div class="kicker">${titleObj.kicker}</div>
      <h2 class="title">${titleObj.title}</h2>
      <p class="lead">${titleObj.lead}</p>
      <div class="card" style="margin-top:24px">
        <div class="qstage">
          <div class="q-meta">
            <span class="tag tier${item.tier}">Tier ${item.tier} · ${item.tierLabel}</span>
            <span class="tag team">${escapeHtml(team.name)}'s question</span>
          </div>
          <div class="q-text">${escapeHtml(item.q)}</div>
          <div class="q-answer" id="ans"></div>
          <div id="auMount"></div>
          <div class="q-actions" id="qActions"></div>
          <div class="q-progress" id="qprog">${list.map((_,k)=>`<span class="pip ${k<i?'done':''} ${k===i?'current':''}"></span>`).join('')}</div>
        </div>
      </div>
      <div class="row between" style="margin-top:16px">
        <button class="btn ghost sm" id="prevQ" ${i===0?'disabled':''}>← Back</button>
        <span class="hint mono">${i+1} / ${list.length}</span>
        <button class="btn ghost sm" id="skipQ">Skip →</button>
      </div>
    </div>`));

  let revealed=false;
  const actions=$("#qActions");
  function drawActions(){
    actions.innerHTML='';
    if(!revealed){
      actions.appendChild(btn('Reveal answer','ghost',()=>{ reveal(); }));
      actions.appendChild(btn(`Correct · +1`,'good',()=>{ adjustScore(team.id,1); next(); }));
      actions.appendChild(btn('Pass / Wrong → Auction','bad',()=>{ reveal(); startAuction(); }));
    } else {
      actions.appendChild(btn(`Correct · +1`,'good',()=>{ adjustScore(team.id,1); next(); }));
      actions.appendChild(btn('Pass / Wrong → Auction','bad',()=>{ startAuction(); }));
      actions.appendChild(btn('Next →','ghost',next));
    }
  }
  function reveal(){ revealed=true; $("#ans").innerHTML=`<span class="lbl">Answer</span>${escapeHtml(item.a)}`; drawActions(); }
  function startAuction(){
    if(!revealed) reveal();
    actions.innerHTML='';
    const pane = openAuction(team.id, ()=>{ next(); });
    $("#auMount").innerHTML=''; $("#auMount").appendChild(pane);
  }
  function next(){ state[idxKey]=i+1; save(); render(); }
  drawActions();

  $("#prevQ").onclick=()=>{ if(i>0){ state[idxKey]=i-1; save(); render(); } };
  $("#skipQ").onclick=next;
}

/* ---------- Pick Your Category ---------- */
function renderCategory(){
  const stage=$("#stage"); stage.innerHTML='';
  const allPicked = Object.keys(state.catPicks).length>=state.teams.length;

  // Phase 1: randomise pick order
  if(state.catOrder.length===0){
    stage.appendChild(el(`
    <div class="fade-in">
      <div class="kicker">Round 02 · Read-aloud + auction</div>
      <h2 class="title">Pick Your Category</h2>
      <p class="lead">Six categories on the board, four get taken — no two teams the same. Picking first is an advantage, so we randomise the order. Spin it:</p>
      <div class="card" style="margin-top:24px;text-align:center">
        <div class="kicker dim">Pick order</div>
        <div class="pickorder" id="poList">${state.teams.map(t=>`<div class="po-item"><span class="pos">—</span><span class="pnm">${escapeHtml(t.name)}</span></div>`).join('')}</div>
        <div class="q-actions"><button class="btn gold" id="spinBtn">🎲 Randomise pick order</button></div>
      </div>
    </div>`));
    $("#spinBtn").onclick=()=>{
      const order=[...state.teams].sort(()=>Math.random()-0.5).map(t=>t.id);
      let step=0;
      const tick=setInterval(()=>{
        const shuffled=[...state.teams].sort(()=>Math.random()-0.5);
        $("#poList").innerHTML=shuffled.map((t,r)=>`<div class="po-item"><span class="pos">${r+1}</span><span class="pnm">${escapeHtml(t.name)}</span></div>`).join('');
        if(++step>11){
          clearInterval(tick);
          state.catOrder=order; save();
          $("#poList").innerHTML=order.map((id,r)=>{const t=state.teams.find(x=>x.id===id);return `<div class="po-item" style="border-color:var(--accent)"><span class="pos">${r+1}</span><span class="pnm">${escapeHtml(t.name)}</span></div>`;}).join('');
          setTimeout(()=>render(),900);
        }
      },90);
    };
    return;
  }

  // Phase 2: teams pick categories in order
  if(!allPicked){
    const nextTeamId = state.catOrder.find(id=>!(id in state.catPicks));
    const nextTeam = state.teams.find(t=>t.id===nextTeamId);
    stage.appendChild(el(`
    <div class="fade-in">
      <div class="kicker">Round 02 · Picking — ${escapeHtml(nextTeam.name)} choose</div>
      <h2 class="title">Pick Your Category</h2>
      <p class="lead"><b style="color:var(--gold)">${escapeHtml(nextTeam.name)}</b>, choose your category. Taken ones are locked out.</p>
      <div class="catgrid" id="catGrid"></div>
      <div class="hint" style="margin-top:16px">Order: ${state.catOrder.map(id=>{const picked=id in state.catPicks; return `<span style="color:${id===nextTeamId?'var(--gold)':picked?'var(--good)':'var(--muted)'}">${escapeHtml(state.teams.find(t=>t.id===id).name)}</span>`;}).join(' → ')}</div>
    </div>`));
    const taken = Object.values(state.catPicks);
    $("#catGrid").innerHTML=CATEGORIES.map(c=>{
      const owner = Object.keys(state.catPicks).find(tid=>state.catPicks[tid]===c.key);
      const isTaken = taken.includes(c.key);
      return `<div class="cat ${isTaken?'taken':''}" data-cat="${c.key}">
        <div class="cn">${c.name}</div><div class="cd">${c.desc}</div>
        ${isTaken?`<div class="owner">${escapeHtml(state.teams.find(t=>t.id==owner).name)}</div>`:''}
      </div>`;
    }).join('');
    $("#catGrid").querySelectorAll('[data-cat]').forEach(node=>{
      if(node.classList.contains('taken'))return;
      node.onclick=()=>{ state.catPicks[nextTeamId]=node.dataset.cat; save(); render(); };
    });
    return;
  }

  // Phase 3: play each team's set
  if(state.catActiveTeam===null){
    stage.appendChild(el(`
    <div class="fade-in">
      <div class="kicker">Round 02 · Categories locked</div>
      <h2 class="title">Pick Your Category</h2>
      <p class="lead">Locked in. Play each team's five questions in turn — same auction rules on a pass.</p>
      <div class="catgrid" style="margin-top:20px">
        ${state.catOrder.map(id=>{const t=state.teams.find(x=>x.id===id);const c=CATEGORIES.find(c=>c.key===state.catPicks[id]);return `<div class="cat" data-play="${id}"><div class="cd">${escapeHtml(t.name)}</div><div class="cn">${c.name}</div><div class="owner" style="color:var(--gold)">Play →</div></div>`;}).join('')}
      </div>
      <div class="q-actions" style="margin-top:20px"><button class="btn ghost sm" id="reCat">Re-pick categories</button></div>
    </div>`));
    stage.querySelectorAll('[data-play]').forEach(n=> n.onclick=()=>{ state.catActiveTeam=+n.dataset.play; state.catQIdx=0; save(); render(); });
    $("#reCat").onclick=()=>{ if(confirm('Clear category picks and order?')){ state.catPicks={};state.catOrder=[];state.catActiveTeam=null; save(); render(); } };
    return;
  }

  // active team's questions
  const team = state.teams.find(t=>t.id===state.catActiveTeam);
  const cat = CATEGORIES.find(c=>c.key===state.catPicks[team.id]);
  let i = state.catQIdx;
  if(i>=cat.qs.length){
    state.catActiveTeam=null; save();
    // all teams played?
    const allPlayed = state.catOrder.every(id=>state._catPlayed && state._catPlayed[id]);
    render(); return;
  }
  const item=cat.qs[i];
  stage.appendChild(el(`
    <div class="fade-in">
      <div class="kicker">Round 02 · ${escapeHtml(team.name)} · ${cat.name}</div>
      <h2 class="title">${cat.name}</h2>
      <div class="card" style="margin-top:18px">
        <div class="qstage">
          <div class="q-meta"><span class="tag team">${escapeHtml(team.name)}</span><span class="tag">Q${i+1} of ${cat.qs.length}</span></div>
          <div class="q-text">${escapeHtml(item.q)}</div>
          <div class="q-answer" id="ans"></div>
          <div id="auMount"></div>
          <div class="q-actions" id="qActions"></div>
          <div class="q-progress">${cat.qs.map((_,k)=>`<span class="pip ${k<i?'done':''} ${k===i?'current':''}"></span>`).join('')}</div>
        </div>
      </div>
      <div class="row between" style="margin-top:16px">
        <button class="btn ghost sm" id="prevQ" ${i===0?'disabled':''}>← Back</button>
        <button class="btn ghost sm" id="endTeam">End ${escapeHtml(team.name)}'s set</button>
      </div>
    </div>`));
  let revealed=false; const actions=$("#qActions");
  function draw(){ actions.innerHTML='';
    if(!revealed){
      actions.appendChild(btn('Reveal answer','ghost',reveal));
      actions.appendChild(btn('Correct · +1','good',()=>{adjustScore(team.id,1);next();}));
      actions.appendChild(btn('Pass / Wrong → Auction','bad',()=>{reveal();auc();}));
    } else {
      actions.appendChild(btn('Correct · +1','good',()=>{adjustScore(team.id,1);next();}));
      actions.appendChild(btn('Pass / Wrong → Auction','bad',auc));
      actions.appendChild(btn('Next →','ghost',next));
    }
  }
  function reveal(){revealed=true;$("#ans").innerHTML=`<span class="lbl">Answer</span>${escapeHtml(item.a)}`;draw();}
  function auc(){ if(!revealed)reveal(); actions.innerHTML=''; const p=openAuction(team.id,next); $("#auMount").appendChild(p); }
  function next(){ state.catQIdx=i+1; save(); render(); }
  draw();
  $("#prevQ").onclick=()=>{ if(i>0){state.catQIdx=i-1;save();render();} };
  $("#endTeam").onclick=()=>{ state.catActiveTeam=null; save();
    // mark this team done; if all done, complete round
    state._catPlayed=state._catPlayed||{}; state._catPlayed[team.id]=true; save();
    if(state.catOrder.every(id=>state._catPlayed[id])){ renderRoundComplete('category','Pick Your Category',()=>{state.catActiveTeam=null;state.catQIdx=0;state._catPlayed={};save();render();}); }
    else render();
  };
}

          <span class="clip-num">${c.title.replace(/\D/g,'')}</span>
          <span class="clip-type ${c.type}">${c.type}</span>
          ${open?`<span class="clip-ans">${escapeHtml(c.a)}</span>`:`<span class="clip-title">— hidden —</span>`}
          <button class="btn ghost sm" data-rev="${c.key}">${open?'Hide':'Reveal'}</button>
        </div>
        ${open?`<div class="clip-mark">${state.teams.map(t=>`<button class="mark-btn ${m[t.id]?'on':''}" data-mk="${c.key}" data-t="${t.id}">${escapeHtml(t.name)} ${m[t.id]?'+1':''}</button>`).join('')}</div>`:''}
      </div>`;
    }).join('');
    listEl.querySelectorAll('[data-rev]').forEach(b=>b.onclick=()=>{
      const k=b.dataset.rev; state.marks[k+'_open']=!state.marks[k+'_open']; save(); draw();
    });
    listEl.querySelectorAll('[data-mk]').forEach(b=>b.onclick=()=>{
      const k=b.dataset.mk,tid=+b.dataset.t;
      state.marks[k]=state.marks[k]||{};
      const was=!!state.marks[k][tid];
      if(was){ state.marks[k][tid]=false; adjustScore(tid,-1,{toast:false}); }
      else{ state.marks[k][tid]=true; adjustScore(tid,1,{toast:false}); }
      save(); draw(); tally();
    });
    tally();
  }
  function tally(){
    const counts=state.teams.map(t=>{ let n=0; clips.forEach(c=>{ if(state.marks[c.key]&&state.marks[c.key][t.id])n++; }); return `${t.name}: ${n}`; });
    $("#tallyLine").textContent=counts.join('  ·  ');
  }
  draw();
  $("#finishWD").onclick=()=>renderRoundComplete(roundKey,title,()=>render());
}

/* ---------- Sumo Showdown (knockout, winner randomised every bout) ---------- */
function renderSumo(){
  const stage=$("#stage"); stage.innerHTML='';
  state.sumo = state.sumo || {picks:{}, order:[], sfWin:[null,null], finalWin:null};
  const S = state.sumo;
  const allPicked = Object.keys(S.picks).length >= state.teams.length;

  // PHASE 1 — teams pick a wrestler
  if(!allPicked){
    const nextTeam = state.teams.find(t=>!(t.id in S.picks));
    stage.appendChild(el(`
      <div class="fade-in">
        <div class="kicker">Round 07 · Interlude · pure chance</div>
        <h2 class="title">Sumo Showdown</h2>
        <p class="lead">Four wrestlers, four teams, knockout to the end. The catch: every bout is a coin-flip — no wrestler is better than another, it's all luck. <b style="color:var(--gold)">${escapeHtml(nextTeam.name)}</b>, pick your champion.</p>
        <div class="sumogrid" id="sumoGrid"></div>
        <div class="row between" style="margin-top:16px">
          <span class="hint">Picked: ${state.teams.filter(t=>t.id in S.picks).map(t=>escapeHtml(t.name)).join(', ')||'—'}</span>
          <button class="btn ghost sm" id="randPicks">🎲 Randomise all picks</button>
        </div>
      </div>`));
    $("#sumoGrid").innerHTML = SUMOS.map((s,i)=>{
      const owners = state.teams.filter(t=>S.picks[t.id]===i).map(t=>t.name);
      return `<div class="sumocard ${owners.length?'chosen':''}" data-sumo="${i}" style="--sc:${s.colour}">
        <div class="emoji">${s.emoji}</div>
        <div class="snm">${escapeHtml(s.name)}</div>
        <div class="stitle">${escapeHtml(s.title)}</div>
        <div class="sstats">
          <span class="stat">Weight<b>${s.weight}</b></span>
          <span class="stat">Record<b>${s.record}</b></span>
        </div>
        <div class="stat" style="margin-top:8px">Signature: <b style="display:inline">${escapeHtml(s.move)}</b></div>
        <div class="staunt">“${escapeHtml(s.taunt)}”</div>
        ${owners.length?`<div class="pickedby">${owners.map(escapeHtml).join(' & ')}</div>`:''}
      </div>`;
    }).join('');
    $("#sumoGrid").querySelectorAll('[data-sumo]').forEach(c=>c.onclick=()=>{
      S.picks[nextTeam.id]=+c.dataset.sumo; save(); render();
    });
    $("#randPicks").onclick=()=>{ state.teams.forEach(t=> S.picks[t.id]=Math.floor(Math.random()*SUMOS.length)); save(); render(); };
    return;
  }

  // build bracket seeding once
  if(S.order.length===0){ S.order=[...state.teams].sort(()=>Math.random()-0.5).map(t=>t.id); save(); }

  const teamById = id=>state.teams.find(t=>t.id===id);
  const sumoOf = id=>SUMOS[S.picks[id]];

  function fighterHtml(teamId, state2){ // state2: 'win'|'lose'|'' 
    if(teamId===null) return `<div class="fighter tbd">Awaiting winner…</div>`;
    const t=teamById(teamId), s=sumoOf(teamId);
    return `<div class="fighter ${state2||''}" style="--sc:${s.colour}">
      <div class="f-emoji">${s.emoji}</div>
      <div class="f-team">${escapeHtml(t.name)}</div>
      <div class="f-sumo">${escapeHtml(s.name)}</div>
    </div>`;
  }

  function boutHtml(label, aId, bId, winnerId, key, locked, isFinal){
    const aState = winnerId==null?'':(winnerId===aId?'win':'lose');
    const bState = winnerId==null?'':(winnerId===bId?'win':'lose');
    const ready = aId!=null && bId!=null;
    return `<div class="bout ${isFinal?'final':''}">
      <div class="bout-label">${label}</div>
      <div class="bout-row">
        ${fighterHtml(aId,aState)}
        <div class="vs" id="vs-${key}">VS</div>
        ${fighterHtml(bId,bState)}
      </div>
      ${ready && winnerId==null ? `<button class="btn gold fight-btn" data-fight="${key}">⚡ FIGHT!</button>` : ''}
      ${winnerId!=null ? `<div class="hint" style="text-align:center;margin-top:12px;color:var(--gold)">${escapeHtml(teamById(winnerId).name)} advances — ${escapeHtml(sumoOf(winnerId).name)} wins by ${randMove()}</div>` : ''}
    </div>`;
  }

  const n = S.order.length;
  const a0=S.order[0],a1=S.order[1],b0=S.order[2],b1=S.order[3];

  stage.appendChild(el(`
    <div class="fade-in">
      <div class="kicker">Round 07 · Interlude · pure chance</div>
      <h2 class="title">Sumo Showdown</h2>
      <p class="lead">Knockout bracket. Hit FIGHT and the winner is drawn at random — re-run it and it could flip. Last wrestler standing takes the belt. Award points by hand however you like.</p>
      <div class="bracket" id="bracket"></div>
      <div class="row between" style="margin-top:16px">
        <button class="btn ghost sm" id="reSumo">Reset showdown</button>
        <button class="btn ghost sm" id="sumoDone">Done → next round</button>
      </div>
    </div>`));

  function drawBracket(){
    const champDone = S.finalWin!=null;
    let html='';
    if(n>=4){
      // 4 teams: two semis feed the final
      const finalA = S.sfWin[0], finalB = S.sfWin[1];
      html = boutHtml('Semi-final 1', a0, a1, S.sfWin[0], 'sf0', false, false)
           + boutHtml('Semi-final 2', b0, b1, S.sfWin[1], 'sf1', false, false)
           + boutHtml('🏆 The Final', finalA, finalB, S.finalWin, 'final', false, true);
    } else if(n===3){
      // 3 teams: one semi, winner faces the third (who byes straight to the final)
      const finalA = S.sfWin[0], finalB = b0; // b0 = S.order[2]
      html = boutHtml('Semi-final', a0, a1, S.sfWin[0], 'sf0', false, false)
           + `<div class="hint" style="text-align:center">${escapeHtml(teamById(b0).name)} gets a bye straight to the final 🍀</div>`
           + boutHtml('🏆 The Final', finalA, finalB, S.finalWin, 'final', false, true);
    } else {
      // 2 teams: just a final
      html = boutHtml('🏆 The Final', a0, a1, S.finalWin, 'final', false, true);
    }
    $("#bracket").innerHTML = html +
      (champDone ? `<div class="champion-banner fade-in">
          <div class="ce">${sumoOf(S.finalWin).emoji}🏆</div>
          <div class="ct">${escapeHtml(teamById(S.finalWin).name)} — Champions</div>
          <div class="hint" style="margin-top:6px">${escapeHtml(sumoOf(S.finalWin).name)}, “${escapeHtml(sumoOf(S.finalWin).title)}”, is undefeated tonight.</div>
        </div>` : '');

    $("#bracket").querySelectorAll('[data-fight]').forEach(btn=>btn.onclick=()=>{
      const key=btn.dataset.fight;
      btn.disabled=true; btn.textContent='💥 …';
      const vs=$("#vs-"+key); if(vs){ vs.textContent='💥'; vs.classList.add('clash'); }
      setTimeout(()=>{
        if(key==='sf0'){ S.sfWin[0]= Math.random()<0.5?a0:a1; }
        else if(key==='sf1'){ S.sfWin[1]= Math.random()<0.5?b0:b1; }
        else if(key==='final'){
          const fA = (n>=4)?S.sfWin[0]:(n===3?S.sfWin[0]:a0);
          const fB = (n>=4)?S.sfWin[1]:(n===3?b0:a1);
          S.finalWin= Math.random()<0.5?fA:fB;
        }
        save(); drawBracket();
      },1300);
    });
  }
  drawBracket();

  $("#reSumo").onclick=()=>{ if(confirm('Reset the whole showdown (picks too)?')){ state.sumo={picks:{},order:[],sfWin:[null,null],finalWin:null}; save(); render(); } };
  $("#sumoDone").onclick=()=>renderRoundComplete('sumo','Sumo Showdown',()=>{ state.sumo={picks:{},order:[],sfWin:[null,null],finalWin:null}; save(); render(); });
}
function randMove(){ const m=["a thunderous shove","ring-out","the Belly Bounce","a last-second slap","sheer momentum","a crowd-pleasing flop","the Ground-Quake Stomp"]; return m[Math.floor(Math.random()*m.length)]; }

      <div class="kicker">Round 10 · Final Wager · question</div>
      <h2 class="title" style="font-size:clamp(1.8rem,5vw,2.6rem)">Final Wager</h2>
      <div class="card" style="margin-top:18px">
        <div class="qstage">
          <div class="q-meta"><span class="tag tier3">Decider</span></div>
          <div class="q-text">${escapeHtml(Q.q)}</div>
          <div class="q-answer" id="fans"></div>
          <div class="q-actions" id="fActions">
            <button class="btn ghost" id="revealF">Reveal answer</button>
          </div>
        </div>
      </div>
      <div class="card hidden" id="resolveCard">
        <div class="kicker dim">Mark each team — did they get it right?</div>
        <div id="resolveGrid"></div>
        <div class="q-actions"><button class="btn gold" id="finishGame">Finish the game 🏆</button></div>
      </div>
    </div>`));
  $("#revealF").onclick=()=>{
    $("#fans").innerHTML=`<span class="lbl">Answer</span>${escapeHtml(Q.a)}`;
    $("#resolveCard").classList.remove('hidden');
    const grid=$("#resolveGrid");
    const applied={};
    grid.innerHTML=state.teams.map(t=>{
      const w=state.finalWagers[t.id]||0;
      return `<div class="row between" style="padding:12px 0;border-bottom:1px solid var(--line);flex-wrap:wrap">
        <div><b>${escapeHtml(t.name)}</b> <span class="hint">wagered ${w}</span></div>
        <div class="row"><button class="btn good sm" data-fr="${t.id}" data-ok="1">Right +${w}</button><button class="btn bad sm" data-fr="${t.id}" data-ok="0">Wrong −${w}</button></div>
      </div>`;
    }).join('');
    grid.querySelectorAll('[data-fr]').forEach(b=>b.onclick=()=>{
      const id=+b.dataset.fr, ok=b.dataset.ok==='1', w=state.finalWagers[id]||0;
      if(applied[id]!==undefined){ adjustScore(id, -applied[id], {toast:false}); } // undo prior choice
      const delta = ok ? w : -w;
      adjustScore(id, delta);
      applied[id]=delta;
      b.parentElement.querySelectorAll('[data-fr]').forEach(x=>x.style.opacity=.4); b.style.opacity=1;
    });
  };
  $("#stage").querySelector('#finishGame') && ($("#stage").querySelector('#finishGame').onclick=showWinner);
  // delegate (button created in hidden card)
  $("#stage").addEventListener('click',e=>{ if(e.target.id==='finishGame') showWinner(); });
}

function showWinner(){
  markDone('final');
  const ranked=[...state.teams].sort((a,b)=>b.score-a.score);
  $("#stage").innerHTML='';
  $("#stage").appendChild(el(`
    <div class="fade-in" style="text-align:center;padding:30px 0">
      <div class="kicker">And that's the night</div>
      <h2 class="title" style="font-size:clamp(2.4rem,9vw,5rem)">🏆 ${escapeHtml(ranked[0].name)}</h2>
      <p class="lead" style="margin:0 auto 8px">win Trivia Night with <b style="color:var(--gold)">${ranked[0].score}</b> points.</p>
      <div class="card" style="max-width:460px;margin:26px auto 0;text-align:left">
        ${ranked.map((t,r)=>`<div class="row between" style="padding:12px 0;${r<ranked.length-1?'border-bottom:1px solid var(--line)':''}">
          <span><b class="mono" style="color:var(--gold)">${r+1}</b>&nbsp;&nbsp;${escapeHtml(t.name)}</span>
          <b class="display" style="font-size:1.3rem">${t.score}</b>
        </div>`).join('')}
      </div>
      <div class="q-actions"><button class="btn ghost" id="backStart">Back to start</button></div>
    </div>`));
  $("#backStart").onclick=()=>go('intro');
  // confetti-lite
  burst();
}
function burst(){
  for(let i=0;i<60;i++){
    const c=document.createElement('div');
    c.style.cssText=`position:fixed;top:-10px;left:${Math.random()*100}vw;width:8px;height:14px;background:${[...MARBLE_COLOURS][i%6]};z-index:300;border-radius:2px;pointer-events:none;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const dur=2000+Math.random()*1500;
    c.animate([{transform:`translateY(0) rotate(0)`,opacity:1},{transform:`translateY(105vh) rotate(${Math.random()*720}deg)`,opacity:.7}],{duration:dur,easing:'cubic-bezier(.3,.6,.5,1)'});
    setTimeout(()=>c.remove(),dur);
  }
}

/* ---------- Easy Bank ---------- */
function renderBank(){
  const stage=$("#stage"); stage.innerHTML='';
  stage.appendChild(el(`
    <div class="fade-in">
      <div class="kicker">Spare pool</div>
      <h2 class="title">Easy Bank</h2>
      <p class="lead">Softer questions to sprinkle in — a warm-up, a filler if a tier runs short, or a kinder question for a team that's falling behind. These don't belong to any round; pull from them whenever.</p>
      <div class="card" style="margin-top:22px">
        ${EASY_BANK.map(q=>`<div class="bank-q"><span>${escapeHtml(q.q)}</span><span class="bq-a">${escapeHtml(q.a)}</span></div>`).join('')}
      </div>
    </div>`));
}

/* ============================================================
   ROUTER
   ============================================================ */
function render(){
  renderScoreboard();
  renderRunorder();
  switch(state.view){
    case 'intro': renderIntro(); break;
    case 'gk': renderGK(); break;
    case 'category': renderCategory(); break;
    case 'soundsong': renderSoundSong(); break;
    case 'marble': renderMarble(); break;
    case 'picture': renderPicture(); break;
    case 'celebrity': renderCelebrity(); break;
    case 'sumo': renderSumo(); break;
    case 'movies': renderMovies(); break;
    case 'heads': renderHeads(); break;
    case 'final': renderFinal(); break;
    case 'bank': renderBank(); break;
    default: renderIntro();
  }
}
render();
</script>
</body>
</html>
